<button class={{status()}} [disabled]="isDisabled()" (click)="navigateOnClick()">
  @if(status() === TournamentStatusCard.pending){
  @if(isDisabled()){
  Vous ne remplissez pas les conditions
  }@else{
  S'inscrire
  }
  }@else if(status() === TournamentStatusCard.inProgress){
  Voir le live
  }@else if(status() === TournamentStatusCard.complete){
  Fermé
  }@else if(status() === TournamentStatusCard.finished){
  Voir les résultats
  }@else if(status() === TournamentStatusCard.registered){
  Se désinscrire
  }
</button>
