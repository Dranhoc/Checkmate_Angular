<main class="m-form">
  <section class="s-form-login">
    <h1>Mister Checkmate</h1>
    <form [formGroup]="formLogin" (ngSubmit)="onSubmit()">
      <h2 class="title-h3">Connexion</h2>
      <p class="subtitle">Rejoignez l'élite du jeu d'échecs.</p>
      <div class="input-block">
        <label for="identifier-input">Pseudo ou email</label>
        <input type="text" id="identifier-input" formControlName="identifier"
          [ngClass]="{'input-error' : identifier.invalid && identifier.touched}">
      </div>
      <div class="input-block">
        <label for="password-input">Password</label>
        <input type="password" id="password-input" formControlName="password">
      </div>
      @if(loginError()){
      <p class="error-message">Identifiant ou mot de passe invalide</p>
      }
      <button class='primary-btn' type="submit" [disabled]="formLogin.invalid">se connecter</button>
      <span class="switch-form">Pas encore de compte ?<a class="header-link" routerLink="/auth/register">
          S'enregistrer</a></span>
    </form>
  </section>
</main>
