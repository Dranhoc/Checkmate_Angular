<main>

  <section class="s-title">
    <h1>Tournois en cours et à venir</h1>
    <h2>Explorez l'élite des compétitions d'échecs. Des opens internationaux aux
      tournois de maîtres, trouvez votre prochain défi intellectuel.</h2>
  </section>

  <section class="s-filters">
    <form action="">
      <div>
        <label for="search-name-input">nom du tournoi</label>
        <input id="search-name-input" type="text" placeholder="Rechercher...">
      </div>
      <div>
        <label for="status-select">status</label>
        <select id="status-select" type="text">
          <option value="">Tous les status</option>
          @for(s of status; track $index){
          <option value={{s}}>{{s}}</option>
          }
        </select>
      </div>
      <div>
        <label for="category-select">catégorie</label>
        <select id="category-select" type="text">
          @for(c of categories; track $index){
          <option value={{c}}>{{c}}</option>
          }
        </select>
      </div>

      <div>
        <label for="search-name-input">ELO</label>
        <input id="search-name-input" type="text" placeholder="{{userELO}}">
      </div>
      <div>

        <label for="search-name-input">Plage ELO</label>
        <div class="s-filters__elo-inputs">
          <input id="search-name-input" type="number" min=0 max=3000 placeholder="Min 0">
          <input id="search-name-input" type="number" min=0 max=3000 placeholder="Max 3000">
        </div>
      </div>

      <div class="checkbox">
        <input id="search-name-input" type="checkbox">
        <label for="search-name-input">can register</label>
      </div>

      <div>
        <label for="">&nbsp;</label>
        <button class="pending w-full">Filtrer</button>
      </div>
    </form>
  </section>

  <section class="s-tournaments">
    <div class="cards-container">
      @for(tournament of tournaments(); track tournament.id){
      <tournament-card [tournament]="tournament" />
      }
    </div>
  </section>

</main>
